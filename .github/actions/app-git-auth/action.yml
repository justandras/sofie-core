name: App Git Auth
description: Create a GitHub App installation token and configure git/gh for bot commits

inputs:
  app-client-id:
    description: GitHub App client ID
    required: true
  app-private-key:
    description: GitHub App private key
    required: true

outputs:
  token:
    description: GitHub App installation access token
    value: ${{ steps.app-token.outputs.token }}
  app-slug:
    description: GitHub App slug
    value: ${{ steps.app-token.outputs.app-slug }}

runs:
  using: composite
  steps:
    - uses: actions/create-github-app-token@v3
      id: app-token
      with:
        client-id: ${{ inputs.app-client-id }}
        private-key: ${{ inputs.app-private-key }}
        permission-contents: write

    - name: Get GitHub App user ID
      id: get-user-id
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
      run: |
        echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

    - name: Configure git for GitHub App
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        USER_ID: ${{ steps.get-user-id.outputs.user-id }}
      run: |
        git config --global user.name "${APP_SLUG}[bot]"
        git config --global user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
        gh auth setup-git
