name: Hotfix patch release

on:
  push:
    branches:
      - "release/**"
    paths:
      - "meteor/**"
      - "packages/**"
      - "yarn.lock"
      - ".github/workflows/hotfix-patch.yml"

permissions:
  contents: write

concurrency:
  group: hotfix-patch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    name: Resolve release bot identity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app-slug: ${{ steps.auth.outputs.app-slug }}
    steps:
      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/app-git-auth
        with:
          app-client-id: ${{ vars.APP_CLIENT_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  patch-release:
    name: Patch version and tag
    needs: setup
    if: >-
      github.actor != format('{0}[bot]', needs.setup.outputs.app-slug) &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/app-git-auth
        with:
          app-client-id: ${{ vars.APP_CLIENT_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ steps.auth.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install packages dependencies
        run: corepack enable && yarn --cwd packages install --immutable

      - name: Fetch trusted version-sync from main
        run: |
          git fetch origin main:refs/remotes/origin/main --depth=1
          git show origin/main:scripts/version-sync.mjs > /tmp/version-sync.mjs

      - name: Version sync and tag
        id: sync
        env:
          VERSION_SYNC_ROOT: ${{ github.workspace }}
          VERSION_SYNC_ALLOW_COMMIT: "1"
        run: |
          RESULT=$(node /tmp/version-sync.mjs \
            --mode patch \
            --commit \
            --github-output)
          echo "tag=$(echo "$RESULT" | jq -r .tag)" >> "$GITHUB_OUTPUT"
          echo "floatingTag=$(echo "$RESULT" | jq -r .floatingTag)" >> "$GITHUB_OUTPUT"
          echo "skipped=$(echo "$RESULT" | jq -r .skipped)" >> "$GITHUB_OUTPUT"
          echo "branch=$(echo "$RESULT" | jq -r .branch)" >> "$GITHUB_OUTPUT"
          echo "json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Push branch and tags
        if: steps.sync.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          BRANCH="${{ steps.sync.outputs.branch }}"
          TAG="${{ steps.sync.outputs.tag }}"
          FLOATING="${{ steps.sync.outputs.floatingTag }}"
          git push origin "HEAD:${BRANCH}"
          git push origin "$TAG" "+${FLOATING}"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.sync.outputs.skipped }}" = "true" ]; then
            echo "Skipped: nothing new to release (${{ steps.sync.outputs.json }})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Patch release ${{ steps.sync.outputs.json }}" >> "$GITHUB_STEP_SUMMARY"
          fi
